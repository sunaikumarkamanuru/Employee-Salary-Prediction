<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account"
      content="ca-pub-9049397859247305">
    
    <script async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9049397859247305"
    crossorigin="anonymous"></script>

    <title>Employee Salary Prediction</title>

    <ins class="adsbygoogle"
        style="display:block"
        data-ad-client="ca-pub-9049397859247305"
        data-ad-slot="YOUR_SLOT_ID"
        data-ad-format="auto"
        data-full-width-responsive="true"></ins>

    <script>
    (adsbygoogle = window.adsbygoogle || []).push({});
    </script>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<footer class="footer">
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/privacy">Privacy Policy</a>
</footer>

<body>

<div class="container py-5">

    <div class="text-center mb-5">
        <h1 class="main-title">💸 Employee Salary Prediction</h1>
        <p class="subtitle">
            Predict employee salaries based on their experience,
            education, role, and industry.
        </p>
    </div>

    <form action="/predict" method="POST">

        <div class="row">

            <!-- Left Column -->
            <div class="col-lg-6 mb-4">
                <div class="card-custom">

                    <h3 class="section-title">
                        Professional Details
                    </h3>

                    <div class="mb-3">
                        <label>Job Title</label>
                        <select class="form-select" name="job_title">
                            {% for item in choices.job_title %}
                            <option>{{ item }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Experience (Years)</label>
                        <input type="number"
                               class="form-control"
                               name="experience_years"
                               min="0"
                               max="50"
                               value="5">
                    </div>

                    <div class="mb-3">
                        <label>Education Level</label>
                        <select class="form-select" name="education_level">
                            {% for item in choices.education_level %}
                            <option>{{ item }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Skills Count</label>
                        <input type="number"
                               class="form-control"
                               name="skills_count"
                               min="0"
                               max="50"
                               value="5">
                    </div>

                    <div class="mb-3">
                        <label>Certifications</label>
                        <input type="number"
                               class="form-control"
                               name="certifications"
                               min="0"
                               max="20"
                               value="1">
                    </div>

                </div>
            </div>

            <!-- Right Column -->
            <div class="col-lg-6 mb-4">
                <div class="card-custom">

                    <h3 class="section-title">
                        Company & Location
                    </h3>

                    <div class="mb-3">
                        <label>Industry</label>
                        <select class="form-select" name="industry">
                            {% for item in choices.industry %}
                            <option>{{ item }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Company Size</label>
                        <select class="form-select" name="company_size">
                            {% for item in choices.company_size %}
                            <option>{{ item }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Location</label>
                        <select class="form-select" name="location">
                            {% for item in choices.location %}
                            <option>{{ item }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Remote Work</label>
                        <select class="form-select" name="remote_work">
                            {% for item in choices.remote_work %}
                            <option>{{ item }}</option>
                            {% endfor %}
                        </select>
                    </div>

                </div>
            </div>

        </div>

        <div class="text-center">
            <button type="submit" class="predict-btn">
                Predict Salary 🚀
            </button>
        </div>

    </form>

    {% if prediction %}
    <div class="result-card mt-4">
        <h2>Estimated Salary</h2>
        <h1>₹{{ prediction }}</h1>
    </div>
    {% endif %}

</div>

</body>
</html>
